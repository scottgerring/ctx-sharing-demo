plugins {
    id 'java'
    id 'application'
}

group = 'com.datadog'
version = '1.0-SNAPSHOT'

sourceCompatibility = '11'
targetCompatibility = '11'

repositories {
    mavenCentral()
}

dependencies {
    // Datadog Trace API for manual instrumentation
    implementation 'com.datadoghq:dd-trace-api:1.30.0'
}

application {
    mainClass = 'com.datadog.demo.DemoApplication'
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

jar {
    manifest {
        attributes(
            'Main-Class': 'com.datadog.demo.DemoApplication'
        )
    }
}
